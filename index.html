<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Contabito</title>

    <!-- PWA & Apple iOS Metadata -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Usamos black-translucent para poder manipular el notch con CSS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Contabito">
    <meta name="theme-color" content="#131420">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778780323/ChatGPT_Image_14_may_2026_12_37_19_p.m._wye8gt.png">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778780323/ChatGPT_Image_14_may_2026_12_37_19_p.m._wye8gt.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #E8EEF2; /* Color base claro */
            margin: 0;
            overflow: hidden; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        /* --- Colores y Fondos --- */
        .bg-dark-top {
            background: linear-gradient(135deg, #1A1B2F 0%, #11121F 100%);
            /* Respetar el safe area del notch para el logo principal */
            padding-top: calc(env(safe-area-inset-top) + 2rem);
        }

        .bg-light-bottom {
            background-color: #E8EEF2;
        }

        /* --- Neumorphism Dark (Top Section) --- */
        .neo-dark {
            background: #151625;
            box-shadow: 8px 8px 16px #0d0e17, -8px -8px 16px #1d1e33;
            border-radius: 2rem;
        }

        /* --- Neumorphism Light (Buttons) --- */
        .neo-btn {
            background: #E8EEF2;
            border-radius: 28px;
            /* Sombra suave y realista */
            box-shadow: 9px 9px 16px rgb(200, 208, 220), -9px -9px 16px rgb(255, 255, 255);
            transition: all 0.2s cubic-bezier(0.5, 1, 0.89, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            border: 1px solid rgba(255,255,255,0.4);
            touch-action: manipulation; /* Remueve delay de 300ms en iOS */
        }

        .neo-btn:active {
            box-shadow: inset 6px 6px 12px rgb(200, 208, 220), inset -6px -6px 12px rgb(255, 255, 255);
            transform: scale(0.95);
        }

        .neo-icon-wrapper {
            width: 54px;
            height: 54px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #E8EEF2;
            box-shadow: inset 4px 4px 8px rgb(200, 208, 220), inset -4px -4px 8px rgb(255, 255, 255);
        }

        /* --- Transiciones y Iframe --- */
        #iframe-container {
            /* 
             * SOLUCIÓN DEL NOTCH / SAFE AREA:
             * Empuja todo el contenido hacia abajo respetando la cámara del iPhone.
             */
            padding-top: env(safe-area-inset-top);
            background-color: #E8EEF2; /* Fondo para que la barra de estado se vea limpia */
            
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0;
            pointer-events: none;
            /* GPU Acceleration */
            transform: scale(0.95) translateZ(0);
            will-change: transform, opacity;
            
            /* Usamos flex para que el iframe ocupe el resto del espacio */
            display: flex;
            flex-direction: column;
        }

        #iframe-container.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateZ(0);
        }

        #app-frame {
            flex-grow: 1; /* Ocupa todo el espacio debajo del Safe Area */
            width: 100%;
            border: none;
            background-color: #ffffff;
            border-top-left-radius: 12px; /* Redondeo leve para integrarse al ecosistema */
            border-top-right-radius: 12px;
        }

        #hub-view {
            transition: opacity 0.4s ease, transform 0.4s ease;
            will-change: transform, opacity;
            transform: translateZ(0);
        }

        /* --- Zona de Detección de Gestos (Edge Swipe) --- */
        #swipe-edge {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 100%;
            z-index: 60;
            pointer-events: none;
        }

        #swipe-edge.active {
            pointer-events: auto;
        }
    </style>
</head>

<body class="relative w-full h-screen flex flex-col bg-light-bottom">

    <!-- SOLUCIÓN: Definición de Gradientes SVG (position absolute w-0 h-0 para que Chrome/Safari no los rompa) -->
    <svg class="absolute w-0 h-0 pointer-events-none" aria-hidden="true" style="position: absolute; width: 0; height: 0;">
        <defs>
            <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#60A5FA" />
                <stop offset="100%" stop-color="#2563EB" />
            </linearGradient>
            <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#C084FC" />
                <stop offset="100%" stop-color="#7E22CE" />
            </linearGradient>
            <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#34D399" />
                <stop offset="100%" stop-color="#059669" />
            </linearGradient>
            <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FBBF24" />
                <stop offset="100%" stop-color="#D97706" />
            </linearGradient>
        </defs>
    </svg>

    <!-- HUB VIEW PRINCIPAL -->
    <main id="hub-view" class="w-full h-full flex flex-col z-10 relative">
        
        <!-- SECCIÓN SUPERIOR OSCURA -->
        <section class="bg-dark-top w-full pb-20 relative flex-shrink-0" style="height: 42%;">
            <div class="max-w-md mx-auto px-6 flex flex-col items-center justify-center h-full relative z-10">
                
                <!-- Logo Neumórfico Oscuro -->
                <div class="neo-dark w-28 h-28 p-2 flex items-center justify-center mb-5">
                    <img src="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778780323/ChatGPT_Image_14_may_2026_12_37_19_p.m._wye8gt.png" 
                         alt="Contabito Logo" 
                         class="w-full h-full object-cover rounded-[1.5rem]">
                </div>

                <h1 class="text-3xl font-extrabold tracking-tight text-white mb-1">Contabito</h1>
                <p class="text-sm font-semibold text-gray-400">Ecosistema Empresarial</p>
            </div>

            <!-- ONDA SEPARADORA -->
            <div class="absolute bottom-[-1px] left-0 w-full overflow-hidden leading-none z-0">
                <svg viewBox="0 0 1200 120" preserveAspectRatio="none" class="w-full h-16 sm:h-20" style="transform: rotateY(180deg);">
                    <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V120H0V95.8C59.71,118.08,130.83,119.5,193.36,99.21,239.52,84.18,280.9,71.21,321.39,56.44Z" fill="#E8EEF2"></path>
                </svg>
            </div>
        </section>

        <!-- SECCIÓN INFERIOR CLARA (Cuadrícula de Apps) -->
        <section class="flex-1 bg-light-bottom w-full px-6 pt-6 pb-12 overflow-y-auto" style="-webkit-overflow-scrolling: touch;">
            <div class="max-w-xs mx-auto grid grid-cols-2 gap-x-8 gap-y-8 mt-2">
                
                <!-- App 1: Contabilidad -->
                <button onclick="openApp('https://contabito.vercel.app')" class="neo-btn">
                    <div class="neo-icon-wrapper">
                        <!-- Icono Libro -->
                        <svg class="w-8 h-8 drop-shadow-md" viewBox="0 0 24 24" fill="url(#grad-blue)">
                            <path d="M11.25 4.533A9.707 9.707 0 006 3a9.735 9.735 0 00-3.25.555.75.75 0 00-.5.707v14.25a.75.75 0 001 .707A8.237 8.237 0 016 18.75c1.995 0 3.823.707 5.25 1.886V4.533zM12.75 20.636A8.214 8.214 0 0118 18.75c1.66 0 3.218.51 4.5 1.385a.75.75 0 001-.707V4.262a.75.75 0 00-.5-.707A9.735 9.735 0 0018 3a9.707 9.707 0 00-5.25 1.533v16.103z" />
                        </svg>
                    </div>
                    <span class="text-[13px] font-bold text-gray-700">Contabilidad</span>
                </button>

                <!-- App 2: Facturación -->
                <button onclick="openApp('https://nodianvip.vercel.app')" class="neo-btn">
                    <div class="neo-icon-wrapper">
                        <!-- Icono Factura -->
                        <svg class="w-8 h-8 drop-shadow-md" viewBox="0 0 24 24" fill="url(#grad-purple)">
                            <path fill-rule="evenodd" d="M2.25 4.125c0-1.036.84-1.875 1.875-1.875h5.25c1.036 0 1.875.84 1.875 1.875V17.25a4.5 4.5 0 11-9 0V4.125zm4.5 3.375a.75.75 0 01.75-.75h.75a.75.75 0 010 1.5h-.75a.75.75 0 01-.75-.75zm0 3a.75.75 0 01.75-.75h.75a.75.75 0 010 1.5h-.75a.75.75 0 01-.75-.75zm0 3a.75.75 0 01.75-.75h.75a.75.75 0 010 1.5h-.75a.75.75 0 01-.75-.75zm6.75-6.75a.75.75 0 01.75-.75h5.25a.75.75 0 010 1.5h-5.25a.75.75 0 01-.75-.75zm.75 2.25a.75.75 0 000 1.5h5.25a.75.75 0 000-1.5h-5.25z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <span class="text-[13px] font-bold text-gray-700">Facturación</span>
                </button>

                <!-- App 3: RR-HH -->
                <button onclick="openApp('https://rr-hh-eqbbito.vercel.app/')" class="neo-btn">
                    <div class="neo-icon-wrapper">
                        <!-- Icono Usuarios -->
                        <svg class="w-8 h-8 drop-shadow-md" viewBox="0 0 24 24" fill="url(#grad-emerald)">
                            <path d="M4.5 6.375a4.125 4.125 0 118.25 0 4.125 4.125 0 01-8.25 0zM14.25 8.625a3.375 3.375 0 116.75 0 3.375 3.375 0 01-6.75 0zM1.5 19.125a7.125 7.125 0 0114.25 0v.003l-.001.119a.75.75 0 01-.363.63 13.067 13.067 0 01-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 01-.364-.63l-.001-.122zM17.25 19.128l-.001.144a2.25 2.25 0 01-.233.96 10.088 10.088 0 005.06-1.01.75.75 0 00.42-.643 4.875 4.875 0 00-6.957-4.611 8.586 8.586 0 011.71 5.157v.003z" />
                        </svg>
                    </div>
                    <span class="text-[13px] font-bold text-gray-700">RR-HH</span>
                </button>

                <!-- App 4: Bodega digital -->
                <button onclick="openApp('https://eqbito.vercel.app')" class="neo-btn">
                    <div class="neo-icon-wrapper">
                        <!-- Icono Cubo -->
                        <svg class="w-8 h-8 drop-shadow-md" viewBox="0 0 24 24" fill="url(#grad-orange)">
                            <path d="M12.378 1.602a.75.75 0 00-.756 0L3 6.632l9 5.25 9-5.25-8.622-5.03zM21.75 7.93l-9 5.25v9l8.628-5.032a.75.75 0 00.372-.648V7.93zM11.25 22.18v-9l-9-5.25v8.57a.75.75 0 00.372.648l8.628 5.033z" />
                        </svg>
                    </div>
                    <span class="text-[13px] font-bold text-gray-700 text-center leading-tight">Bodega digital</span>
                </button>

            </div>
        </section>
    </main>

    <!-- CONTENEDOR DE LA WEB (Con Safe Area implementado) -->
    <div id="iframe-container" class="fixed inset-0 z-20 w-full h-full">
        
        <!-- Pantalla de Carga -->
        <div id="loading-indicator" class="absolute inset-0 flex items-center justify-center bg-light-bottom z-30 transition-opacity duration-500">
            <div class="neo-btn !rounded-2xl p-6 flex flex-col items-center gap-4 border-none">
                <svg class="animate-spin h-10 w-10 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="text-gray-600 text-sm font-bold tracking-wide">Conectando...</span>
            </div>
        </div>
        
        <!-- El Iframe se renderiza debajo del Notch del iPhone gracias al padding-top del contenedor -->
        <iframe id="app-frame" src="about:blank"></iframe>
    </div>

    <!-- ZONA DE DETECCIÓN DE GESTO (Edge Swipe Left) -->
    <div id="swipe-edge" aria-hidden="true"></div>

    <script>
        const iframeContainer = document.getElementById('iframe-container');
        const appFrame = document.getElementById('app-frame');
        const hubView = document.getElementById('hub-view');
        const loadingIndicator = document.getElementById('loading-indicator');
        const swipeEdge = document.getElementById('swipe-edge');

        appFrame.addEventListener('load', hideLoading);

        function openApp(url) {
            if(appFrame.src !== url) {
                loadingIndicator.style.opacity = '1';
                loadingIndicator.style.pointerEvents = 'auto';
                appFrame.src = url;
            }
            
            hubView.style.transform = 'scale(0.92)';
            hubView.style.opacity = '0';
            
            iframeContainer.style.transform = ''; 
            iframeContainer.classList.add('active');
            swipeEdge.classList.add('active');
        }

        function hideLoading() {
            if(appFrame.src !== 'about:blank' && appFrame.src !== window.location.href) {
                loadingIndicator.style.opacity = '0';
                setTimeout(() => {
                    loadingIndicator.style.pointerEvents = 'none';
                }, 500);
            }
        }

        function goHome() {
            iframeContainer.style.transform = ''; 
            iframeContainer.classList.remove('active');
            swipeEdge.classList.remove('active');
            
            hubView.style.transform = 'scale(1)';
            hubView.style.opacity = '1';
            
            // Liberar memoria RAM
            setTimeout(() => {
                appFrame.src = 'about:blank';
                loadingIndicator.style.opacity = '1';
            }, 400);
        }

        // --- Lógica Inmersiva de Gestos (Edge Swipe tipo iOS) ---
        let touchStartX = 0;

        swipeEdge.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        swipeEdge.addEventListener('touchmove', (e) => {
            let currentX = e.changedTouches[0].screenX;
            let deltaX = currentX - touchStartX;
            
            if (deltaX > 0) {
                iframeContainer.style.transition = 'none';
                iframeContainer.style.transform = `translateX(${deltaX}px) scale(1) translateZ(0)`;
            }
        }, {passive: true});

        swipeEdge.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].screenX;
            let deltaX = touchEndX - touchStartX;
            
            iframeContainer.style.transition = ''; 

            if (deltaX > 70) { 
                goHome(); // Si deslizó más de 70px, regresamos al Hub
            } else {
                iframeContainer.style.transform = ''; // Si se arrepintió, vuelve a su lugar
            }
        });
    </script>

</body>
</html>
