<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contabito</title>

    <!-- PWA & Apple iOS Metadata -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Contabito">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778780323/ChatGPT_Image_14_may_2026_12_37_19_p.m._wye8gt.png">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778780323/ChatGPT_Image_14_may_2026_12_37_19_p.m._wye8gt.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            overflow: hidden; /* Evita scroll en la vista principal */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Liquid Animations */
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, 40px) scale(1.2); }
            66% { transform: translate(20px, -20px) scale(0.8); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .liquid-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.7;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #3b82f6 0%, #1d4ed8 100%);
            top: -100px;
            left: -100px;
            animation: float1 15s infinite ease-in-out;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #8b5cf6 0%, #6d28d9 100%);
            bottom: -150px;
            right: -100px;
            animation: float2 18s infinite ease-in-out;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #06b6d4 0%, #0369a1 100%);
            top: 40%;
            left: 30%;
            animation: float1 20s infinite ease-in-out reverse;
        }

        /* Liquid Glass Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            position: relative;
            z-index: 10;
        }

        /* Card Hover Effects */
        .glass-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden;
        }
        
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: all 0.7s ease;
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .glass-card:active {
            transform: translateY(2px) scale(0.98);
        }

        .glass-card:hover::before {
            left: 200%;
        }

        /* Iframe Container & Transitions */
        #iframe-container {
            transition: opacity 0.5s ease, transform 0.5s ease;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95) translateY(20px);
        }

        #iframe-container.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
        }

        .back-btn {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(15, 23, 42, 0.9);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="relative w-full h-screen flex flex-col items-center justify-center">

    <!-- Liquid Background Elements -->
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
    <div class="liquid-blob blob-3"></div>

    <!-- Main Dashboard Hub -->
    <main id="hub-view" class="w-full max-w-md p-6 flex flex-col items-center justify-center transition-all duration-500 z-10">
        
        <!-- Logo & Title -->
        <div class="glass-panel rounded-3xl p-6 mb-6 w-full flex flex-col items-center animate-[pulse-glow_4s_infinite]">
            <div class="w-24 h-24 rounded-full p-1 bg-gradient-to-tr from-blue-500 to-purple-500 shadow-2xl mb-4">
                <img src="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778780323/ChatGPT_Image_14_may_2026_12_37_19_p.m._wye8gt.png" 
                     alt="Contabito Logo" 
                     class="w-full h-full object-cover rounded-full border-4 border-slate-900">
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-300 drop-shadow-md">
                Contabito
            </h1>
            <p class="text-xs text-gray-400 mt-1 font-light tracking-widest uppercase">Ecosistema Seguro</p>
        </div>

        <!-- Links Grid -->
        <div class="w-full flex flex-col gap-4">
            
            <!-- App 1: Contabito Vercel -->
            <button onclick="openApp('https://contabito.vercel.app', 'Contabito')" class="glass-panel glass-card rounded-2xl p-5 flex items-center justify-between w-full group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center border border-blue-500/30 group-hover:bg-blue-500/40 transition-colors">
                        <!-- Icono de Libro (Contabilidad) -->
                        <svg class="w-6 h-6 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                    </div>
                    <div class="text-left">
                        <h2 class="text-lg font-semibold text-white">Contabito</h2>
                        <p class="text-xs text-blue-200/60 mt-0.5">Plataforma Principal</p>
                    </div>
                </div>
                <svg class="w-6 h-6 text-gray-400 group-hover:text-white transform group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>

            <!-- App 2: Factubito -->
            <button onclick="openApp('https://nodianvip.vercel.app', 'Factubito')" class="glass-panel glass-card rounded-2xl p-5 flex items-center justify-between w-full group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-purple-500/20 flex items-center justify-center border border-purple-500/30 group-hover:bg-purple-500/40 transition-colors">
                        <!-- Icono de Factura / Recibo -->
                        <svg class="w-6 h-6 text-purple-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <div class="text-left">
                        <h2 class="text-lg font-semibold text-white">Factubito</h2>
                        <p class="text-xs text-purple-200/60 mt-0.5">Acceso Exclusivo</p>
                    </div>
                </div>
                <svg class="w-6 h-6 text-gray-400 group-hover:text-white transform group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>

            <!-- App 3: ProHR Secure -->
            <!-- App 3: RR-HH Eqbito -->
            <button onclick="openApp('https://rr-hh-eqbbito.vercel.app/', 'RR-HH Eqbito')" class="glass-panel glass-card rounded-2xl p-5 flex items-center justify-between w-full group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center border border-emerald-500/30 group-hover:bg-emerald-500/40 transition-colors">
                        <!-- Icono de Equipo de Trabajo / Recursos Humanos -->
                        <svg class="w-6 h-6 text-emerald-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                    </div>
                    <div class="text-left">
                        <h2 class="text-lg font-semibold text-white">RR-HH Eqbito</h2>
                        <p class="text-xs text-emerald-200/60 mt-0.5">Gestión Empresarial</p>
                    </div>
                </div>
                <svg class="w-6 h-6 text-gray-400 group-hover:text-white transform group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>

        </div>
    </main>

    <!-- Iframe Container (Internal Navigation) -->
    <div id="iframe-container" class="fixed inset-0 z-50 w-full h-full bg-[#0f172a] flex flex-col">
        
        <!-- Top Navigation Bar for the inside app -->
        <div class="h-20 w-full glass-panel border-b border-white/10 flex items-end justify-between px-4 pb-3 flex-shrink-0">
            <button onclick="closeApp()" class="back-btn px-4 py-2 rounded-full text-sm font-medium text-white flex items-center gap-2 shadow-lg">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Volver
            </button>
            <span id="app-title" class="text-sm font-semibold tracking-wide text-gray-300 pb-2">Cargando...</span>
            <div class="w-20"></div> <!-- Spacer for centering -->
        </div>

        <!-- The actual Web Content -->
        <div class="w-full flex-grow relative bg-white">
            <!-- Loading Indicator -->
            <div id="loading-indicator" class="absolute inset-0 flex items-center justify-center bg-[#0f172a] z-10 transition-opacity duration-300">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
            </div>
            
            <iframe id="app-frame" class="w-full h-full border-none" src="about:blank"></iframe>
        </div>
    </div>

    <!-- Logic -->
    <script>
        const iframeContainer = document.getElementById('iframe-container');
        const appFrame = document.getElementById('app-frame');
        const hubView = document.getElementById('hub-view');
        const appTitle = document.getElementById('app-title');
        const loadingIndicator = document.getElementById('loading-indicator');

        // Escuchar el evento de carga desde JS en lugar de hacerlo en línea en el HTML
        appFrame.addEventListener('load', hideLoading);

        // Function to open apps INSIDE the Contabito shell
        function openApp(url, title) {
            // Set UI state
            appTitle.innerText = title;
            loadingIndicator.style.opacity = '1';
            loadingIndicator.style.pointerEvents = 'auto';
            
            // Load URL
            appFrame.src = url;
            
            // Animate transition
            hubView.style.transform = 'scale(0.9) translateY(-20px)';
            hubView.style.opacity = '0';
            
            setTimeout(() => {
                iframeContainer.classList.add('active');
            }, 100);
        }

        // Called when iframe finishes loading
        function hideLoading() {
            if(appFrame.src !== 'about:blank' && appFrame.src !== window.location.href) {
                loadingIndicator.style.opacity = '0';
                setTimeout(() => {
                    loadingIndicator.style.pointerEvents = 'none';
                }, 300);
            }
        }

        // Function to close the app and return to hub
        function closeApp() {
            // Animate out
            iframeContainer.classList.remove('active');
            
            setTimeout(() => {
                appFrame.src = 'about:blank'; // Clear iframe to save memory
                
                // Bring hub back
                hubView.style.transform = 'scale(1) translateY(0)';
                hubView.style.opacity = '1';
            }, 500);
        }
    </script>

</body>
</html>
