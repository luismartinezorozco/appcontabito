<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Contabito</title>

    <!-- PWA & Apple iOS Metadata -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Contabito">
    <meta name="theme-color" content="#050505">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778780323/ChatGPT_Image_14_may_2026_12_37_19_p.m._wye8gt.png">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778780323/ChatGPT_Image_14_may_2026_12_37_19_p.m._wye8gt.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #050505;
            color: #ffffff;
            margin: 0;
            overflow: hidden; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Optimized Liquid Background --- */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            background: #050505;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 15s infinite alternate ease-in-out;
            transform: translateZ(0); /* Hardware acceleration */
        }

        .blob-1 {
            width: 300px; height: 300px;
            background: #0A84FF; /* Blue */
            top: -50px; left: -100px;
            animation-duration: 12s;
        }

        .blob-2 {
            width: 350px; height: 350px;
            background: #BF5AF2; /* Purple */
            bottom: -100px; right: -50px;
            animation-duration: 18s;
            animation-direction: alternate-reverse;
        }

        .blob-3 {
            width: 250px; height: 250px;
            background: #30D158; /* Emerald */
            top: 40%; left: 50%;
            animation-duration: 15s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 50px) scale(1.1); }
            100% { transform: translate(-40px, 20px) scale(0.9); }
        }

        /* --- Liquid Glass Elements --- */
        .glass-panel {
            background: rgba(25, 25, 30, 0.3);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-card {
            background: rgba(25, 25, 30, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        .glass-card:active {
            background: rgba(40, 40, 45, 0.5);
            transform: scale(0.96);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* --- Iframe & View Transitions --- */
        #iframe-container {
            transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px) scale(0.98);
        }

        #iframe-container.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        #hub-view {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* --- Bottom Navigation Dock --- */
        #bottom-dock {
            padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 10px);
        }

        .nav-item {
            transition: all 0.3s ease;
            position: relative;
        }
        
        .nav-item.active {
            color: #ffffff;
            transform: translateY(-4px);
        }
        
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(255,255,255,0.5);
        }

        .nav-item:not(.active) {
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="relative w-full h-screen flex flex-col">

    <!-- Animated Liquid Background -->
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- MAIN HUB VIEW -->
    <main id="hub-view" class="w-full max-w-md mx-auto h-full flex flex-col z-10 px-5 pt-12 pb-32 overflow-y-auto">
        
        <!-- Header Section -->
        <header class="flex flex-col items-center justify-center mb-10 mt-8">
            <div class="w-24 h-24 rounded-3xl overflow-hidden mb-5 border border-white/10 shadow-[0_0_30px_rgba(255,255,255,0.1)] bg-black/50 backdrop-blur-md p-1">
                <img src="https://res.cloudinary.com/dkufuo5wc/image/upload/v1778780323/ChatGPT_Image_14_may_2026_12_37_19_p.m._wye8gt.png" 
                     alt="Contabito Logo" 
                     class="w-full h-full object-cover rounded-[1.3rem]">
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white drop-shadow-md">
                Contabito
            </h1>
            <p class="text-sm text-white/60 font-medium mt-1">Ecosistema Empresarial</p>
        </header>

        <div class="w-full flex flex-col gap-4">
            
            <!-- App 1: Contabito -->
            <button onclick="openApp('https://contabito.vercel.app', 'tab-contabito')" class="glass-card rounded-3xl p-4 flex items-center justify-between w-full">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-blue-500/20 flex items-center justify-center border border-blue-500/30 shadow-[0_0_15px_rgba(10,132,255,0.3)]">
                        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                    </div>
                    <div class="text-left">
                        <h2 class="text-lg font-semibold text-white leading-tight">Contabito</h2>
                        <p class="text-xs text-white/50 mt-0.5 font-medium">Plataforma Principal</p>
                    </div>
                </div>
            </button>

            <!-- App 2: Factubito -->
            <button onclick="openApp('https://nodianvip.vercel.app', 'tab-factubito')" class="glass-card rounded-3xl p-4 flex items-center justify-between w-full">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-purple-500/20 flex items-center justify-center border border-purple-500/30 shadow-[0_0_15px_rgba(191,90,242,0.3)]">
                        <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <div class="text-left">
                        <h2 class="text-lg font-semibold text-white leading-tight">Factubito</h2>
                        <p class="text-xs text-white/50 mt-0.5 font-medium">Facturación Avanzada</p>
                    </div>
                </div>
            </button>

            <!-- App 3: RR-HH Eqbito -->
            <button onclick="openApp('https://rr-hh-eqbbito.vercel.app/', 'tab-rrhh')" class="glass-card rounded-3xl p-4 flex items-center justify-between w-full">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-emerald-500/20 flex items-center justify-center border border-emerald-500/30 shadow-[0_0_15px_rgba(48,209,88,0.3)]">
                        <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                    </div>
                    <div class="text-left">
                        <h2 class="text-lg font-semibold text-white leading-tight">RR-HH Eqbito</h2>
                        <p class="text-xs text-white/50 mt-0.5 font-medium">Gestión de Personal</p>
                    </div>
                </div>
            </button>

        </div>
    </main>

    <!-- WEB CONTENT CONTAINER (Replaces the old "Back" bar system) -->
    <div id="iframe-container" class="fixed inset-0 z-20 w-full h-full bg-[#000000]">
        
        <!-- Glass Loader -->
        <div id="loading-indicator" class="absolute inset-0 flex items-center justify-center bg-black/80 backdrop-blur-lg z-30 transition-opacity duration-500">
            <div class="glass-panel p-6 rounded-3xl flex flex-col items-center gap-4">
                <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-white shadow-[0_0_15px_rgba(255,255,255,0.5)]"></div>
                <span class="text-white/80 text-sm font-medium tracking-wide">Cargando Plataforma...</span>
            </div>
        </div>
        
        <!-- iframe uses full screen, but we add padding at bottom so dock doesn't cover content -->
        <iframe id="app-frame" class="w-full h-full border-none pb-[90px]" src="about:blank"></iframe>
    </div>

    <!-- FLOATING LIQUID GLASS DOCK (Always visible) -->
    <nav id="bottom-dock" class="fixed bottom-0 w-full z-50 flex justify-center pointer-events-none">
        <div class="glass-panel px-6 py-4 rounded-[2rem] flex items-center gap-8 pointer-events-auto mb-2 mx-4 max-w-sm w-full justify-between">
            
            <!-- Tab: Home -->
            <button onclick="goHome()" id="tab-home" class="nav-item active flex flex-col items-center gap-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
            </button>

            <!-- Tab: Contabito -->
            <button onclick="openApp('https://contabito.vercel.app', 'tab-contabito')" id="tab-contabito" class="nav-item flex flex-col items-center gap-1 text-blue-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
            </button>

            <!-- Tab: Factubito -->
            <button onclick="openApp('https://nodianvip.vercel.app', 'tab-factubito')" id="tab-factubito" class="nav-item flex flex-col items-center gap-1 text-purple-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </button>

            <!-- Tab: RR-HH -->
            <button onclick="openApp('https://rr-hh-eqbbito.vercel.app/', 'tab-rrhh')" id="tab-rrhh" class="nav-item flex flex-col items-center gap-1 text-emerald-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
            </button>

        </div>
    </nav>

    <script>
        const iframeContainer = document.getElementById('iframe-container');
        const appFrame = document.getElementById('app-frame');
        const hubView = document.getElementById('hub-view');
        const loadingIndicator = document.getElementById('loading-indicator');
        
        const navItems = {
            'tab-home': document.getElementById('tab-home'),
            'tab-contabito': document.getElementById('tab-contabito'),
            'tab-factubito': document.getElementById('tab-factubito'),
            'tab-rrhh': document.getElementById('tab-rrhh')
        };

        // Ocultar loader cuando el iframe termine de cargar
        appFrame.addEventListener('load', hideLoading);

        function updateDock(activeTabId) {
            // Remover clase active de todos
            Object.values(navItems).forEach(item => item.classList.remove('active'));
            // Añadir clase active al seleccionado
            navItems[activeTabId].classList.add('active');
        }

        function openApp(url, tabId) {
            updateDock(tabId);

            // Solo mostrar pantalla de carga si estamos cambiando a una URL nueva
            if(appFrame.src !== url) {
                loadingIndicator.style.opacity = '1';
                loadingIndicator.style.pointerEvents = 'auto';
                appFrame.src = url;
            }
            
            // Efecto visual de fondo enviándose hacia atrás
            hubView.style.transform = 'scale(0.9)';
            hubView.style.opacity = '0';
            
            // Mostrar Iframe
            iframeContainer.classList.add('active');
        }

        function hideLoading() {
            if(appFrame.src !== 'about:blank' && appFrame.src !== window.location.href) {
                loadingIndicator.style.opacity = '0';
                setTimeout(() => {
                    loadingIndicator.style.pointerEvents = 'none';
                }, 500);
            }
        }

        function goHome() {
            updateDock('tab-home');
            
            // Ocultar iframe
            iframeContainer.classList.remove('active');
            
            // Traer de vuelta el fondo
            hubView.style.transform = 'scale(1)';
            hubView.style.opacity = '1';
        }
    </script>

</body>
</html>
